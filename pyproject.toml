[build-system]
# Keep setuptools below 81 to match the bundled vLLM build constraints.
requires = [
    "setuptools==80.10.2",
    "wheel==0.46.3",
]
build-backend = "setuptools.build_meta"

[project]
name = "semantiq"
version = "0.1.0"
description = "SemantiQ evaluation harness with a bundled vLLM integration."
readme = "notice.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "fuzzywuzzy==0.18.0",
    "jieba==0.42.1",
    "numpy==2.2.6",
    "rouge==1.0.1",
    "torch==2.11.0",
    "vllm",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["eval*"]
exclude = ["tests*", "vllm*"]

[dependency-groups]
dev = [
    "pytest==9.0.3",
]
vllm-cuda = [
    "aiohttp==3.13.5",
    "anthropic==0.96.0",
    "av==17.0.0",
    "blake3==1.0.8",
    "cachetools==7.0.5",
    "cbor2==5.9.0",
    "cloudpickle==3.1.2",
    "compressed-tensors==0.15.0.1",
    "depyf==0.20.0",
    "diskcache==5.6.3",
    "einops==0.8.2",
    "fastapi[standard]==0.136.0",
    "fastsafetensors==0.2.2",
    "filelock==3.28.0",
    "flashinfer-cubin==0.6.7",
    "flashinfer-python==0.6.7",
    "gguf==0.18.0",
    "ijson==3.5.0",
    "lark==1.2.2",
    "llguidance==1.3.0",
    "lm-format-enforcer==0.11.3",
    "mcp==1.27.0",
    "mistral-common[image]==1.11.0",
    "model-hosting-container-standards==0.1.14",
    "msgspec==0.21.1",
    "ninja==1.13.0",
    "numba==0.61.2",
