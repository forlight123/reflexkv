[tool.uv.sources]
# Resolve vLLM from this repository's bundled source tree.
vllm = { path = "vllm", editable = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "vllm"]

[tool.semantiq.local_packages]
vllm_source_path = "vllm"
vllm_source_version = "0.19.1rc1.dev391+g80b18230e"
vllm_installed_version_in_project_venv = "0.19.1rc1.dev391+g80b18230e.precompiled"

[tool.semantiq.conda_semantiq]
prefix = "/home/ytm/miniforge3/envs/semantiq"
